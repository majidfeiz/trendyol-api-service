services:
  trendyol-api:
    build:
      context: .
      # host network lets the build stage use the host's DNS/proxy settings.
      network: host
    container_name: trendyol-api-service
    restart: unless-stopped
    dns:
      - 178.22.122.100   # Shecan — Iranian unfiltered DNS
      - 10.202.10.102    # 403.online — Iranian unfiltered DNS fallback
    # Chrome needs at least 256 MB of /dev/shm for stable rendering
    shm_size: 256m
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - PORT=8080
      - TRENDYOL_BASE_URL=${TRENDYOL_BASE_URL:-https://public.trendyol.com}
      - REQUEST_TIMEOUT_SECONDS=${REQUEST_TIMEOUT_SECONDS:-15}
      - MAX_CONCURRENT=${MAX_CONCURRENT:-20}
      - RETRY_COUNT=${RETRY_COUNT:-3}
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-120}
      - MAX_BATCH_SIZE=${MAX_BATCH_SIZE:-50}
      - CHROME_PATH=/usr/bin/chromium-browser
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
